name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ==========================================
      # 🔨 СБОРКА БЭКЕНДА (NestJS)
      # ==========================================
      - name: Build Backend
        run: |
          npm install
          npm run build

      # ==========================================
      # 🔨 СБОРКА ФРОНТЕНДА (Nuxt)
      # ==========================================
      - name: Build Frontend
        run: |
          cd frontend
          pnpm install
          pnpm build
          cd ..

      # ==========================================
      # 📤 СИНХРОНИЗАЦИЯ И ДЕПЛОЙ НА СЕРВЕР
      # ==========================================
      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "❌ Error: SSH_HOST secret is empty!"; exit 1; fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then echo "❌ Error: SSH_USER secret is empty!"; exit 1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "❌ Error: SSH_PRIVATE_KEY secret is empty!"; exit 1; fi

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync and Reload on Server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_PATH: "/var/www/store"
        run: |
          # Создаем папку SSH и сканируем публичный ключ сервера
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          # Синхронизируем файлы
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/.nuxt' \
            --exclude='.git' \
            --exclude='.idea' \
            --exclude='.env' \
            --exclude='frontend/.env' \
            ./ "$SSH_USER@$SSH_HOST:$SERVER_PATH/"
            
          # Запускаем скрипт перезапуска на сервере
          ssh "$SSH_USER@$SSH_HOST" "cd $SERVER_PATH && chmod +x reload_server.sh && ./reload_server.sh"
