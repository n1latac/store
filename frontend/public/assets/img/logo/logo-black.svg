<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 38" width="200" height="38" fill="none">
  <!-- Aivix Tech Logo - Dark theme for light backgrounds -->
  <defs>
    <!-- Brain icon inside each node -->
    <g id="brain-dark">
      <line x1="0" y1="-1.2" x2="0" y2="1.2" stroke="#1891ac" stroke-width="0.3" opacity="0.9" />
      <path d="M 0 -0.8 C -0.8 -0.8 -1.2 -0.5 -1.2 -0.1 C -1.2 0.3 -0.7 0.4 0 0.4" stroke="#1891ac" stroke-width="0.3" fill="none" />
      <path d="M 0 -0.3 C -1.0 -0.3 -1.3 0.1 -1.3 0.5 C -1.3 0.9 -0.6 1.0 0 1.0" stroke="#1891ac" stroke-width="0.3" fill="none" />
      <path d="M 0 -0.8 C -0.5 -1.3 -0.2 -1.3 0 -1.0" stroke="#1891ac" stroke-width="0.3" fill="none" />
      
      <path d="M 0 -0.8 C 0.8 -0.8 1.2 -0.5 1.2 -0.1 C 1.2 0.3 0.7 0.4 0 0.4" stroke="#1891ac" stroke-width="0.3" fill="none" />
      <path d="M 0 -0.3 C 1.0 -0.3 1.3 0.1 1.3 0.5 C 1.3 0.9 0.6 1.0 0 1.0" stroke="#1891ac" stroke-width="0.3" fill="none" />
      <path d="M 0 -0.8 C 0.5 -1.3 0.2 -1.3 0 -1.0" stroke="#1891ac" stroke-width="0.3" fill="none" />
    </g>
  </defs>

  <!-- Connection Lines -->
  <g stroke="#1891ac" opacity="0.6" stroke-linecap="round">
    <!-- Node 1 connections -->
    <!-- Fan to Node 4 -->
    <path d="M 12 10 L 19.5 28" stroke-width="0.6" />
    <path d="M 12 10 Q 13 19 19.5 28" stroke-width="0.4" opacity="0.7" />
    <path d="M 12 10 Q 18 19 19.5 28" stroke-width="0.4" opacity="0.7" />
    <!-- Straight to Node 5 -->
    <line x1="12" y1="10" x2="34.5" y2="28" stroke-width="0.6" />

    <!-- Node 2 connections -->
    <line x1="27" y1="10" x2="19.5" y2="28" stroke-width="0.6" />
    <line x1="27" y1="10" x2="34.5" y2="28" stroke-width="0.6" />

    <!-- Node 3 connections -->
    <!-- Straight to Node 4 -->
    <line x1="42" y1="10" x2="19.5" y2="28" stroke-width="0.6" />
    <!-- Fan to Node 5 -->
    <path d="M 42 10 L 34.5 28" stroke-width="0.6" />
    <path d="M 42 10 Q 41 19 34.5 28" stroke-width="0.4" opacity="0.7" />
    <path d="M 42 10 Q 36 19 34.5 28" stroke-width="0.4" opacity="0.7" />
  </g>

  <!-- Glowing outer rings -->
  <g stroke="#1891ac" stroke-width="0.5" fill="none" opacity="0.3">
    <circle cx="12" cy="10" r="5" />
    <circle cx="27" cy="10" r="5" />
    <circle cx="42" cy="10" r="5" />
    <circle cx="19.5" cy="28" r="5" />
    <circle cx="34.5" cy="28" r="5" />
  </g>

  <!-- Node Circles -->
  <g stroke="#1891ac" stroke-width="1" fill="#ffffff">
    <circle cx="12" cy="10" r="3.5" />
    <circle cx="27" cy="10" r="3.5" />
    <circle cx="42" cy="10" r="3.5" />
    <circle cx="19.5" cy="28" r="3.5" />
    <circle cx="34.5" cy="28" r="3.5" />
  </g>

  <!-- Brain Icons inside Nodes -->
  <use href="#brain-dark" x="12" y="10" />
  <use href="#brain-dark" x="27" y="10" />
  <use href="#brain-dark" x="42" y="10" />
  <use href="#brain-dark" x="19.5" y="28" />
  <use href="#brain-dark" x="34.5" y="28" />

  <!-- Vertical Divider -->
  <line x1="56" y1="8" x2="56" y2="30" stroke="#000000" stroke-width="1" opacity="0.15" />

  <!-- Typography -->
  <text x="66" y="25" font-family="'Montserrat', 'Inter', -apple-system, sans-serif" font-size="16" font-weight="800" fill="#1891ac" letter-spacing="1.5">AIVIX</text>
  <text x="126" y="25" font-family="'Montserrat', 'Inter', -apple-system, sans-serif" font-size="16" font-weight="400" fill="#252525" letter-spacing="1.5" opacity="0.9">TECH</text>
</svg>
