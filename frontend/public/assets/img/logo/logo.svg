<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 31" width="180" height="31" fill="none">
  <!-- Aivix tech Logo - White version for dark/teal backgrounds -->
  <defs>
    <linearGradient id="logoGrad" x1="1" y1="1" x2="25" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>
  
  <g transform="translate(2, 2.5)">
    <!-- Symmetric Tech 'A' Icon -->
    <path d="M 13 1 L 25 25 L 19 25 L 13 13 L 7 25 L 1 25 Z" fill="url(#logoGrad)" />
    
    <!-- Cyber crossbar -->
    <path d="M 9 18 H 17" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    
    <!-- Circuit nodes -->
    <circle cx="13" cy="1" r="2" fill="#ffffff" />
    <circle cx="1" cy="25" r="2" fill="#38bdf8" />
    <circle cx="25" cy="25" r="2" fill="#38bdf8" />
    <circle cx="13" cy="13" r="1.5" fill="#ffffff" />
  </g>
  
  <!-- Text -->
  <text x="36" y="23" font-family="'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="0.2">
    Aivix<tspan font-weight="300" fill="#ffffff"> tech</tspan>
  </text>
</svg>
